     1|name: Tests
     2|
     3|on:
     4|  push:
     5|    branches: [main, ethie/slice-test-4]
     6|    paths-ignore:
     7|      - '**/*.md'
     8|      - 'docs/**'
     9|  pull_request:
    10|    branches: [main]
    11|    paths-ignore:
    12|      - '**/*.md'
    13|      - 'docs/**'
    14|
    15|permissions:
    16|  contents: read
    17|
    18|# Cancel in-progress runs for the same PR/branch
    19|concurrency:
    20|  group: tests-${{ github.ref }}
    21|  cancel-in-progress: true
    22|
    23|jobs:
    24|  test:
    25|    runs-on: ubuntu-latest
    26|    timeout-minutes: 30
    27|    strategy:
    28|      fail-fast: false
    29|      matrix:
    30|        slice: [1, 2, 3, 4]
    31|    steps:
    32|      - name: Checkout code
    33|        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    34|
    35|      - name: Restore duration cache
    36|        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
    37|        with:
    38|          path: test_durations.json
    39|          # Single stable key. main always overwrites, PRs always find it.
    40|          key: test-durations
    41|
    42|      - name: Install ripgrep (prebuilt binary)
    43|        run: |
    44|          set -euo pipefail
    45|          RG_VERSION=15.1.0
    46|          RG_SHA256=1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599
    47|          RG_TARBALL=ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz
    48|          curl -sSfL -o "$RG_TARBALL" \
    49|            "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}/${RG_TARBALL}"
    50|          echo "${RG_SHA256}  ${RG_TARBALL}" | sha256sum -c -
    51|          tar -xzf "$RG_TARBALL"
    52|          sudo mv "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl/rg" /usr/local/bin/rg
    53|          rm -rf "$RG_TARBALL" "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl"
    54|          rg --version
    55|
    56|      - name: Install uv
    57|        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
    58|
    59|      - name: Set up Python 3.11
    60|        run: uv python install 3.11
    61|
    62|      - name: Install dependencies
    63|        run: |
    64|          uv venv .venv --python 3.11
    65|          source .venv/bin/activate
    66|          uv pip install -e ".[all,dev]"
    67|
    68|      - name: Run tests (slice ${{ matrix.slice }}/4)
    69|        # Per-file isolation via scripts/run_tests_parallel.py: discovers
    70|        # every test_*.py file under tests/ (excluding integration/ + e2e/),
    71|        # then runs `python -m pytest <file>` in a freshly-spawned subprocess
    72|        # with bounded parallelism. No xdist, no shared workers, no
    73|        # module-level state leakage between files.
    74|        #
    75|        # Why per-file (not per-test): per-test spawn cost (~250ms × 17k
    76|        # tests = 70min CPU minimum) blew the wall-clock budget. Per-file
    77|        # spawn (~250ms × ~850 files = ~3.5min) fits while still giving
    78|        # every file a fresh interpreter — the only isolation boundary
    79|        # that matters in practice (cross-file leakage was the original
    80|        # flake source; intra-file is the test author's responsibility).
    81|        #
    82|        # Why drop xdist entirely: xdist's persistent workers accumulate
    83|        # state across files, which is exactly the leakage we wanted to
    84|        # fix. ThreadPoolExecutor + subprocess.run is ~60 lines and does
    85|        # the job with cleaner semantics.
    86|        #
    87|        # Matrix slicing (--slice I/N): files are distributed across 4
    88|        # jobs by cached duration (LPT algorithm) so each job gets
    89|        # roughly equal wall time. Without a cache, files default to 2s
    90|        # estimate and get split roughly evenly by count — still correct,
    91|        # just not perfectly balanced.
    92|        run: |
    93|          source .venv/bin/activate
    94|          python scripts/run_tests_parallel.py --slice ${{ matrix.slice }}/4
    95|        env:
    96|          # Ensure tests don't accidentally call real APIs
    97|          OPENROUTER_API_KEY: ""
    98|          OPENAI_API_KEY: ""
    99|          NOUS_API_KEY: ""
   100|
   101|      - name: Upload per-slice durations
   102|        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
   103|        with:
   104|          name: test-durations-slice-${{ matrix.slice }}
   105|          path: test_durations.json
   106|          retention-days: 1
   107|
   108|  # Merge per-slice duration data into a single cache, so future runs
   109|  # (including PRs) get balanced slicing.
   110|  save-durations:
   111|    needs: test
   112|    if: always() && github.ref == 'refs/heads/main'
   113|    runs-on: ubuntu-latest
   114|    steps:
   115|      - name: Download all slice durations
   116|        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
   117|        with:
   118|          pattern: test-durations-slice-*
   119|          path: durations
   120|          merge-multiple: true
   121|
   122|      - name: Merge into single durations file
   123|        run: |
   124|          python3 -c "
   125|          import json, glob, os
   126|          merged = {}
   127|          for f in glob.glob('durations/*test_durations.json'):
   128|            with open(f) as fh:
   129|              merged.update(json.load(fh))
   130|          with open('test_durations.json', 'w') as fh:
   131|            json.dump(merged, fh, indent=2, sort_keys=True)
   132|          print(f'Merged {len(merged)} file durations')
   133|          "
   134|
   135|      - name: Save merged duration cache
   136|        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
   137|        with:
   138|          path: test_durations.json
   139|          key: test-durations
   140|
   141|  e2e:
   142|    runs-on: ubuntu-latest
   143|    timeout-minutes: 15
   144|    steps:
   145|      - name: Checkout code
   146|        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
   147|
   148|      - name: Install ripgrep (prebuilt binary)
   149|        run: |
   150|          set -euo pipefail
   151|          RG_VERSION=15.1.0
   152|          RG_SHA256=1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599
   153|          RG_TARBALL=ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz
   154|          curl -sSfL -o "$RG_TARBALL" \
   155|            "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}/${RG_TARBALL}"
   156|          echo "${RG_SHA256}  ${RG_TARBALL}" | sha256sum -c -
   157|          tar -xzf "$RG_TARBALL"
   158|          sudo mv "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl/rg" /usr/local/bin/rg
   159|          rm -rf "$RG_TARBALL" "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl"
   160|          rg --version
   161|
   162|      - name: Install uv
   163|        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
   164|
   165|      - name: Set up Python 3.11
   166|        run: uv python install 3.11
   167|
   168|      - name: Install dependencies
   169|        run: |
   170|          uv venv .venv --python 3.11
   171|          source .venv/bin/activate
   172|          uv pip install -e ".[all,dev]"
   173|
   174|      - name: Run e2e tests
   175|        run: |
   176|          source .venv/bin/activate
   177|          python -m pytest tests/e2e/ -v --tb=short
   178|        env:
   179|          OPENROUTER_API_KEY: ""
   180|          OPENAI_API_KEY: ""
   181|          NOUS_API_KEY: ""
   182|